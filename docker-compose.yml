#
# docker-compose.yml — AgentTable on Easypanel
#
# One container: FastAPI serves web UI + API + MCP.
# SQLite persists in /data (mounted as a Docker volume).
# Traefik (managed by Easypanel) terminates HTTPS for us.
#
# IMPORTANT: We use `expose:` instead of `ports:` so Easypanel's
# auto-generated override doesn't try to bind the host port (often taken
# by Traefik itself) — same learning as agentanbud. Traefik reaches the
# container via the Docker network on port 8080 directly.
#
# Local dev without Easypanel:
#   docker build -t agenttable . && docker run -p 8081:8080 -v ./data:/data agenttable
# or run uvicorn directly (see README).
#
services:
  app:
    build: .
    expose:
      - "8080"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/application.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Admin auth — when set, mutating endpoints require X-Admin-Key
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      # Company data: require the key for MCP reads too (recommended in prod)
      - MCP_REQUIRE_KEY=${MCP_REQUIRE_KEY:-true}
    restart: unless-stopped
