<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}AgentTable{% endblock %} — CSV in, MCP ut</title>
  <meta name="description" content="{% block description %}AgentTable — minimal Airtable-lik lagring. Ladda upp CSV, lagra i SQLite, exponera via MCP för agenter.{% endblock %}" />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Favicon (inline SVG, table grid) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='2' fill='%232563eb'/%3E%3Cpath d='M2 6h12M2 10h12M6 3v10M11 3v10' stroke='white' stroke-width='1.2'/%3E%3C/svg%3E" />

  <link rel="stylesheet" href="/static/style.css?v={{ asset_ver }}" />
  <script defer src="/static/app.js?v={{ asset_ver }}"></script>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <a class="skip-link" href="#main">Hoppa till innehåll</a>
  <header class="site">
    <div class="inner">
      <a href="/" class="brand">
        <span class="dot"></span>
        <span>AgentTable</span>
      </a>
      <nav>
        <a href="/" class="{% set p=request.url.path if request else '' %}{% if p == '/' %}active{% endif %}">Datasets</a>
        <button id="theme-toggle" class="theme-toggle" aria-label="Växla mörkt/ljust läge" title="Mörkt/ljust läge">◐</button>
      </nav>
    </div>
  </header>
  <main id="main">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="inner">
      <span class="muted">AgentTable — CSV in, SQLite-lagring, MCP ut.</span>
      <span class="footer-links">
        <a href="/api/health">API</a>
        <a href="/mcp">MCP</a>
      </span>
    </div>
  </footer>
</body>
</html>
